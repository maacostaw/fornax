# ---- Servidor ----
server.port=8082

# ---- Base de datos PostgreSQL ----
# DB_URL, DB_USER y DB_PASSWORD se pueden sobreescribir con variables de entorno.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fornax_producto}
spring.datasource.username=${DB_USER:usr_fornax_producto}
spring.datasource.password=${DB_PASSWORD:pswd_fornax_producto}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
